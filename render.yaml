services:
  - type: web
    name: researchmind-ai
    runtime: python
    buildCommand: pip install --upgrade pip setuptools && pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 8080
