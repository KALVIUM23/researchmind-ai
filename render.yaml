services:
  - type: web
    name: researchmind-ai
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install --upgrade pip setuptools && pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 8080
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/backend
