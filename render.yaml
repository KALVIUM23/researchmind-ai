services:
  - type: web
    name: researchmind-ai
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --only-binary=:all: -r requirements.txt || pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8080
    workingDirectory: backend
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 8080
